<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USDT Staking dApp</title>
<script src="https://cdn.jsdelivr.net/npm/ethers/dist/ethers.min.js"></script>
<script src="abi.js"></script> <!-- your ABI file -->
<style>
body { font-family: Arial, sans-serif; padding:20px; background:#f5f5f5; }
.connect-btn { padding:10px 20px; background:#4CAF50; color:white; border:none; cursor:pointer; }
.connect-btn.connected { background:#333; }
#toast { visibility:hidden; min-width:200px; margin-left:-100px; background:#333; color:#fff;
    text-align:center; border-radius:5px; padding:10px; position:fixed; z-index:1;
    left:50%; bottom:30px; font-size:17px;}
#toast.show { visibility:visible; animation:fadein 0.5s, fadeout 0.5s 2.5s;}
@keyframes fadein { from {bottom:0; opacity:0;} to {bottom:30px; opacity:1;} }
@keyframes fadeout { from {bottom:30px; opacity:1;} to {bottom:0; opacity:0;} }
.stats, .actions { margin-top:20px; }
.stats div, .actions div { margin-bottom:10px; }
</style>
</head>
<body>

<h2>USDT Staking dApp</h2>

<button class="connect-btn" id="connectBtn" onclick="toggleConnect()">CONNECT WALLET</button>
<div id="refLink">Referral link will appear here</div>

<div class="stats">
<h3>My Stats</h3>
<div>Deposit: <span id="myDeposit">0</span></div>
<div>Pending Rewards: <span id="pendingRewards">0</span></div>
<div>Total Earned: <span id="totalEarned">0</span></div>
<div>Total Withdrawn: <span id="totalWithdrawnUser">0</span></div>
<div>Referral Pending: <span id="refPending">0</span></div>
<div>Referral Total: <span id="refTotal">0</span></div>
</div>

<div class="stats">
<h3>Pool Stats</h3>
<div>TVL: <span id="statTVL">0</span></div>
<div>Total Deposited: <span id="statDeposited">0</span></div>
<div>Total Withdrawn: <span id="statWithdrawn">0</span></div>
<div>Daily Yield: <span id="heroRate">0%</span></div>
</div>

<div class="actions">
<h3>Actions</h3>
<div>
<input type="text" id="depositAmount" placeholder="Amount USDT">
<button onclick="deposit()">Deposit</button>
</div>
<div>
<button onclick="withdraw()">Withdraw Rewards</button>
</div>
<div>
<button onclick="compound()">Compound Rewards</button>
</div>
</div>

<div id="toast"></div>

<script>
const CONTRACT_ADDRESS = "0x441D75BcA3C9345257E884FB00967329868ef864"; // your contract
const USDT_ADDRESS     = "0x55d398326f99059fF775485246999027B3197955"; // BSC USDT

let provider;
let signer;
let contract;
let walletAddress;
let connected = false;

// ── CONNECT WALLET ──
async function toggleConnect() {
    if (!window.ethereum) return alert("MetaMask not detected!");

    try {
        provider = new ethers.BrowserProvider(window.ethereum);
        await provider.send("eth_requestAccounts", []);
        signer = await provider.getSigner();
        walletAddress = await signer.getAddress();

        contract = new ethers.Contract(CONTRACT_ADDRESS, CONTRACT_ABI, signer);

        connected = true;

        const btn = document.getElementById("connectBtn");
        btn.innerText = walletAddress.slice(0,6) + "..." + walletAddress.slice(-4);
        btn.classList.add("connected");

        document.getElementById("refLink").textContent =
            "https://yourdomain.xyz/?ref=" + walletAddress;

        await loadUserStats();
        await loadPoolStats();

        toast("Wallet connected!");
    } catch (err) {
        console.error(err);
        toast("Connection failed");
    }
}

// ── LOAD USER STATS ──
async function loadUserStats() {
    if (!connected) return;

    try {
        const stats = await contract.getUserStats(walletAddress);

        document.getElementById("myDeposit").innerText =
            ethers.formatUnits(stats[0],18);
        document.getElementById("pendingRewards").innerText =
            ethers.formatUnits(stats[1],18);
        document.getElementById("totalEarned").innerText =
            ethers.formatUnits(stats[2],18);
        document.getElementById("totalWithdrawnUser").innerText =
            ethers.formatUnits(stats[3],18);
        document.getElementById("refPending").innerText =
            ethers.formatUnits(stats[6],18);
        document.getElementById("refTotal").innerText =
            ethers.formatUnits(stats[7],18);

    } catch(e) { console.error(e); }
}

// ── LOAD POOL STATS ──
async function loadPoolStats() {
    if (!connected) return;

    try {
        const stats = await contract.getPoolStats();

        document.getElementById("statTVL").innerText =
            "$" + ethers.formatUnits(stats._tvl,18);
        document.getElementById("statDeposited").innerText =
            "$" + ethers.formatUnits(stats._totalDeposited,18);
        document.getElementById("statWithdrawn").innerText =
            "$" + ethers.formatUnits(stats._totalWithdrawn,18);

        const yieldPct = (stats._dailyYield / 100).toFixed(2) + "%";
        document.getElementById("heroRate").innerText = yieldPct;

    } catch(e) { console.error(e); }
}

// ── ACTIONS ──
async function deposit() {
    if (!connected) return toast("Connect wallet first");
    const amount = document.getElementById("depositAmount").value;
    if (!amount || isNaN(amount) || Number(amount)<=0) return toast("Enter valid amount");

    try {
        const usdt = new ethers.Contract(USDT_ADDRESS, USDT_ABI, signer);
        const decimals = 18;
        const amt = ethers.parseUnits(amount, decimals);

        // Approve USDT to staking contract
        const approveTx = await usdt.approve(CONTRACT_ADDRESS, amt);
        await approveTx.wait();

        // Deposit
        const depositTx = await contract.deposit(amt);
        await depositTx.wait();

        toast("Deposit successful!");
        await loadUserStats();
        await loadPoolStats();
    } catch(e) { console.error(e); toast("Deposit failed"); }
}

async function withdraw() {
    if (!connected) return toast("Connect wallet first");
    try {
        const tx = await contract.withdraw();
        await tx.wait();
        toast("Rewards withdrawn!");
        await loadUserStats();
        await loadPoolStats();
    } catch(e) { console.error(e); toast("Withdraw failed"); }
}

async function compound() {
    if (!connected) return toast("Connect wallet first");
    try {
        const tx = await contract.compound();
        await tx.wait();
        toast("Rewards compounded!");
        await loadUserStats();
        await loadPoolStats();
    } catch(e) { console.error(e); toast("Compound failed"); }
}

// ── TOAST ──
function toast(msg) {
    const t = document.getElementById("toast");
    t.innerText = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 3000);
}

// ── AUTO REFRESH ──
setInterval(async () => {
    if (connected) { await loadUserStats(); await loadPoolStats(); }
}, 10000);
</script>

</body>
</html>
